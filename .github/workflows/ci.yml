name: CI

on: push

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4

      - run: |
          cd backend
          go mod tidy
          go test ./...

      - run: docker build -t app ./backend-go

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2

      - run: |
          cd mobile_flutter
          flutter pub get
          flutter test