
services:
  #DATABASE SERVICE
  db:
    image: postgres:16-alpine
    container_name: chat-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-28102005}
      POSTGRES_DB: chatsystem_uts
    ports:
      - "127.0.0.1:5432:5432" 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d chatsystem_uts"]
      interval: 5s
      timeout: 5s
      retries: 5
        
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro 
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_nw

  #BACKEND SERVICE
  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: chat-backend
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-28102005}
      DB_NAME: chatsystem_uts
    ports:
      - "8080:8080"
    networks:
      - backend_nw

# --- NETWORK & VOLUME CONFIGURATION ---
networks:
  backend_nw:
    driver: bridge

volumes:
  postgres_data: